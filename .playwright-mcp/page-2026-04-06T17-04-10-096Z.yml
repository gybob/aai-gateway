              - heading "1. Add AAI Gateway to your agent" [level=3] [ref=e146]:
                - link:
                  - /url: "#1-add-aai-gateway-to-your-agent"
                - text: 1. Add AAI Gateway to your agent
              - paragraph [ref=e147]:
                - strong [ref=e148]: Claude Code
              - code [ref=e151]: claude mcp add --scope user --transport stdio aai-gateway -- npx -y aai-gateway
              - paragraph [ref=e152]:
                - strong [ref=e153]: Codex
              - code [ref=e156]: codex mcp add aai-gateway -- npx -y aai-gateway
              - paragraph [ref=e157]:
                - strong [ref=e158]: OpenCode
                - text: — add to
                - code [ref=e159]: ~/.config/opencode/opencode.json
                - text: ":"
              - code [ref=e162]: "{ \"mcp\": { \"aai-gateway\": { \"type\": \"local\", \"command\": [\"npx\", \"-y\", \"aai-gateway\"], \"enabled\": true } } }"
              - heading "2. Start using it" [level=3] [ref=e163]:
                - link:
                  - /url: "#2-start-using-it"
                - text: 2. Start using it
              - paragraph [ref=e164]: "Just talk to your AI agent:"
              - blockquote [ref=e165]:
                - paragraph [ref=e166]: "\"Help me search for a filesystem MCP and install it\""
                - paragraph [ref=e167]:
                  - text: "\"Import this MCP:"
                  - code [ref=e168]: npx -y @anthropic-ai/mcp-server-fetch
                  - text: "\""
                - paragraph [ref=e169]: "\"What tools do I have installed?\""
              - paragraph [ref=e170]: That's it. No config files to edit, no agent restarts needed.
              - separator [ref=e171]
              - 'heading "How It Works: Two-Stage Disclosure" [level=2] [ref=e172]':
                - link:
                  - /url: "#how-it-works-twostage-disclosure"
                - text: "How It Works: Two-Stage Disclosure"
              - paragraph [ref=e173]:
                - text: This is the core innovation. Instead of dumping all tool schemas into the prompt, AAI Gateway uses
                - strong [ref=e174]: progressive disclosure
                - text: ":"
              - code [ref=e177]: "┌─────────────────────────────────────────────────────────────────────┐ │ Stage 1 — What the agent sees in its tool list │ │ │ │ guide:filesystem \"Read/write local files and directories\" │ ~50 chars │ guide:github \"Manage GitHub repos, issues, and PRs\" │ ~50 chars │ guide:slack \"Send messages and manage Slack channels\" │ ~50 chars │ ... (one line per app, no parameter schemas) │ ├─────────────────────────────────────────────────────────────────────┤ │ Stage 2 — Agent decides to use filesystem │ │ │ │ → Calls guide:filesystem │ │ ← Gets full tool list + parameter schemas + usage examples │ │ → Executes via aai:exec { app, tool, args } │ └─────────────────────────────────────────────────────────────────────┘"
              - paragraph [ref=e178]:
                - strong [ref=e179]: The math
                - text: ": 10 MCP servers with 5 tools each ="
                - strong [ref=e180]: 50 full schemas
                - text: in traditional setup. With AAI Gateway =
                - strong [ref=e181]: 10 short summaries
                - text: + details loaded only when needed. Context savings of
                - strong [ref=e182]: 90%+
                - text: .
              - separator [ref=e183]
              - heading "Key Features" [level=2] [ref=e184]:
                - link:
                  - /url: "#key-features"
                - text: Key Features
              - heading "Search & Install with Natural Language" [level=3] [ref=e185]:
                - link:
                  - /url: "#search-amp-install-with-natural-language"
                - text: Search & Install with Natural Language
              - paragraph [ref=e186]: Describe what you need, and AAI Gateway finds it for you. It searches trusted sources (official MCP registries, curated lists), presents options, and handles the entire import flow.
              - blockquote [ref=e187]:
                - paragraph [ref=e188]: "\"Find me an MCP for database queries\" → search → select → imported → ready"
              - heading "Import Any MCP Server" [level=3] [ref=e189]:
                - link:
                  - /url: "#import-any-mcp-server"
                - text: Import Any MCP Server
              - paragraph [ref=e190]: Paste any standard MCP config and ask your agent to import it through AAI Gateway.
              - paragraph [ref=e191]:
                - strong [ref=e192]: "stdio MCP:"
              - code [ref=e195]: "{ \"command\": \"npx\", \"args\": [\"-y\", \"@modelcontextprotocol/server-filesystem\", \"/tmp\"] }"
