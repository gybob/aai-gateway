              - code [ref=e205]: "{ \"url\": \"https://example.com/sse\", \"transport\": \"sse\" }"
              - heading "Import Skills" [level=3] [ref=e206]:
                - link:
                  - /url: "#import-skills"
                - text: Import Skills
              - paragraph [ref=e207]: "Import local or remote skill packages. AAI Gateway copies them into managed storage and exposes them as tools. Future updates: automatic skill updates from remote sources."
              - heading "Agent Interoperability (ACP)" [level=3] [ref=e208]:
                - link:
                  - /url: "#agent-interoperability-acp"
                - text: Agent Interoperability (ACP)
              - paragraph [ref=e209]: "AAI Gateway ships with built-in support for popular coding agents (Claude Code, Codex, OpenCode) and exposes them as controllable apps. This means:"
