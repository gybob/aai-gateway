              - text: Search & Install with Natural Language
            - paragraph [ref=e600]: Describe what you need, and AAI Gateway finds it for you. It searches trusted sources (official MCP registries, curated lists), presents options, and handles the entire import flow.
            - blockquote [ref=e601]:
