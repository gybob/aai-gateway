            - code [ref=e691]: ┌─────────────────────────────────────────────────────────────┐ │ AI Agents │ │ Claude Code / Codex / OpenCode / ... │ └────────────────────────┬────────────────────────────────────┘ │ Single MCP Connection (stdio) ▼ ┌─────────────────────────────────────────────────────────────┐ │ MCP Server — Protocol layer │ ├─────────────────────────────────────────────────────────────┤ │ Core Gateway │ │ ┌─────────────────────────────────────────────────────┐ │ │ │ Progressive Disclosure — summaries → on-demand │ │ │ │ Per-Agent Visibility — enable / disable / remove │ │ │ │ Import — MCP servers, skills, search & discover │ │ │ └─────────────────────────────────────────────────────┘ │ ├─────────────────────────────────────────────────────────────┤ │ Execution — Route calls to the right executor │ ├──────────────────────┬──────────────────────────────────────┤ │ Storage │ Seed │ │ ~/.local/share/ │ Pre-built ACP agent descriptors │ │ aai-gateway/apps/ │ written on startup (always fresh) │ └──────────────────────┴──────────────────────────────────────┘
