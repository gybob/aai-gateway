            - paragraph [ref=e584]: That's it. No config files to edit, no agent restarts needed.
            - separator [ref=e585]
            - 'heading "How It Works: Two-Stage Disclosure" [level=2] [ref=e586]':
              - link:
                - /url: "#how-it-works-twostage-disclosure"
              - text: "How It Works: Two-Stage Disclosure"
            - paragraph [ref=e587]:
              - text: This is the core innovation. Instead of dumping all tool schemas into the prompt, AAI Gateway uses
              - strong [ref=e588]: progressive disclosure
              - text: ":"
            - code [ref=e591]: "┌─────────────────────────────────────────────────────────────────────┐ │ Stage 1 — What the agent sees in its tool list │ │ │ │ guide:filesystem \"Read/write local files and directories\" │ ~50 chars │ guide:github \"Manage GitHub repos, issues, and PRs\" │ ~50 chars │ guide:slack \"Send messages and manage Slack channels\" │ ~50 chars │ ... (one line per app, no parameter schemas) │ ├─────────────────────────────────────────────────────────────────────┤ │ Stage 2 — Agent decides to use filesystem │ │ │ │ → Calls guide:filesystem │ │ ← Gets full tool list + parameter schemas + usage examples │ │ → Executes via aai:exec { app, tool, args } │ └─────────────────────────────────────────────────────────────────────┘"
            - paragraph [ref=e592]:
              - strong [ref=e593]: The math
              - text: ": 10 MCP servers with 5 tools each ="
              - strong [ref=e594]: 50 full schemas
              - text: in traditional setup. With AAI Gateway =
              - strong [ref=e595]: 10 short summaries
              - text: + details loaded only when needed. Context savings of
              - strong [ref=e596]: 90%+
              - text: .
            - separator [ref=e597]
