              - text: 2. Start using it
            - paragraph [ref=e578]: "Just talk to your AI agent:"
            - blockquote [ref=e579]:
              - paragraph [ref=e580]: "\"Help me search for a filesystem MCP and install it\""
              - paragraph [ref=e581]:
                - text: "\"Import this MCP:"
