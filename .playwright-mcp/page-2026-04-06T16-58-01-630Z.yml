              - text: 1. Add AAI Gateway to your agent
            - paragraph [ref=e561]:
              - strong [ref=e562]: Claude Code
            - code [ref=e565]: claude mcp add --scope user --transport stdio aai-gateway -- npx -y aai-gateway
            - paragraph [ref=e566]:
              - strong [ref=e567]: Codex
