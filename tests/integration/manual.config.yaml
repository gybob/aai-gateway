# AAI Gateway 手动测试配置文件
# 用于配置测试环境变量和测试端点

# ============================================================================
# 测试环境配置
# ============================================================================
test:
  # 测试数据目录
  data_dir: /tmp/aai-gateway-test

  # 测试日志目录
  log_dir: /tmp/aai-gateway-test/logs

  # 测试应用目录
  apps_dir: /tmp/aai-gateway-test/apps

  # 测试注册表目录
  registry_dir: /tmp/aai-gateway-test/registry

# ============================================================================
# 环境变量配置
# ============================================================================
environment:
  # 开发模式
  AAI_DEV_MODE: "true"

  # 日志级别: debug, info, warn, error
  LOG_LEVEL: "debug"

  # 缓存 TTL（毫秒）
  AAI_CACHE_TTL: "300000"

  # 扫描超时（毫秒）
  AAI_SCAN_TIMEOUT: "10000"

  # MCP 连接超时（毫秒）
  AAI_MCP_TIMEOUT: "5000"

  # 用户数据目录（测试环境）
  AAI_USER_DATA_DIR: "/tmp/aai-gateway-test/user-data"

# ============================================================================
# MCP 服务器配置
# ============================================================================
mcp_server:
  # 服务器启动配置
  server:
    # 开发模式
    dev_mode: true

    # 启用调试日志
    debug: true

    # 最大并发连接数
    max_connections: 10

  # 测试端点配置
  endpoints:
    # 本地测试 MCP 服务器
    - id: test-filesystem
      name: "Test Filesystem"
      protocol: mcp
      config:
        transport: stdio
        command: npx
        args:
          - "-y"
          - "@modelcontextprotocol/server-filesystem"
          - "/tmp"

    # CLI 测试端点
    - id: test-cli
      name: "Test CLI"
      protocol: cli
      config:
        command: echo
        args:
          - "Hello World"

    # ACP Agent 测试端点（如果可用）
    - id: test-opencode
      name: "OpenCode Agent"
      protocol: acp-agent
      config:
        command: opencode
        args:
          - "acp"

# ============================================================================
# 发现机制配置
# ============================================================================
discovery:
  # 发现源优先级
  priorities:
    desktop: 100
    agents: 90
    managed: 80

  # 缓存配置
  cache:
    # 是否启用缓存
    enabled: true

    # 缓存 TTL（毫秒）
    ttl: 300000

    # 缓存键前缀
    prefix: "aai-discovery-"

  # 源配置
  sources:
    # Desktop 发现源
    desktop:
      enabled: true
      scan_paths:
        - "~/.local/share/aai-gateway/apps"
        - "/Applications"
        - "/usr/share"

    # Agent 发现源
    agents:
      enabled: true
      scan_paths:
        - "~/.config/aai-gateway/agents"

    # Managed 发现源
    managed:
      enabled: true
      scan_paths:
        - "~/.local/share/aai-gateway/apps/managed"

# ============================================================================
# 存储系统配置
# ============================================================================
storage:
  # 注册表配置
  registry:
    # MCP 注册表路径
    mcp: "${test.registry_dir}/mcp-registry.json"

    # Skill 注册表路径
    skill: "${test.registry_dir}/skill-registry.json"

    # Managed 注册表路径
    managed: "${test.registry_dir}/managed-registry.json"

  # 缓存配置
  cache:
    # 启用缓存
    enabled: true

    # 默认 TTL（毫秒）
    default_ttl: 300000

    # 最大缓存条目数
    max_entries: 1000

    # 清理间隔（毫秒）
    cleanup_interval: 60000

# ============================================================================
# 测试数据配置
# ============================================================================
test_data:
  # 测试描述符
  descriptors:
    # MCP 文件系统测试描述符
    - id: test-mcp-filesystem
      path: "${test.apps_dir}/mcp-filesystem.json"
      content: |
        {
          "schemaVersion": "2.0",
          "version": "1.0.0",
          "app": {
            "name": {
              "default": "Filesystem",
              "en": "Filesystem",
              "zh-CN": "文件系统"
            },
            "iconUrl": "https://example.com/icons/filesystem.png"
          },
          "access": {
            "protocol": "mcp",
            "config": {
              "transport": "stdio",
              "command": "npx",
              "args": ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]
            }
          },
          "exposure": {
            "keywords": ["files", "local", "filesystem"],
            "summary": "用于读取、写入、列出和搜索本地文件。"
          }
        }

    # CLI 测试应用描述符
    - id: test-cli-app
      path: "${test.apps_dir}/cli-app.json"
      content: |
        {
          "schemaVersion": "2.0",
          "version": "1.0.0",
          "app": {
            "name": {
              "default": "Test CLI App",
              "en": "Test CLI App",
              "zh-CN": "测试 CLI 应用"
            }
          },
          "access": {
            "protocol": "cli",
            "config": {
              "command": "echo",
              "args": ["Hello"]
            }
          },
          "exposure": {
            "keywords": ["test", "cli"],
            "summary": "测试 CLI 应用。"
          }
        }

    # 远程 MCP 服务器测试描述符
    - id: test-remote-mcp
      path: "${test.apps_dir}/remote-mcp.json"
      content: |
        {
          "schemaVersion": "2.0",
          "version": "1.0.0",
          "app": {
            "name": {
              "default": "Remote MCP",
              "en": "Remote MCP"
            }
          },
          "access": {
            "protocol": "mcp",
            "config": {
              "transport": "streamable-http",
              "url": "http://localhost:3000/mcp"
            }
          },
          "exposure": {
            "keywords": ["remote", "mcp"],
            "summary": "远程 MCP 服务器测试。"
          }
        }

  # 测试技能
  skills:
    - id: test-skill-1
      path: "${test.apps_dir}/test-skill-1"
      files:
        SKILL.md: |
          # Test Skill 1

          This is a test skill for AAI Gateway.

          ## Description

          A simple test skill.

          ## Usage

          Use this skill for testing purposes.
        README.md: |
          # Test Skill 1

          This is a test skill.

    - id: test-skill-2
      path: "${test.apps_dir}/test-skill-2"
      files:
        SKILL.md: |
          # Test Skill 2

          Another test skill.

          ## Description

          Second test skill.

# ============================================================================
# CLI 测试配置
# ============================================================================
cli_tests:
  # 测试命令列表
  commands:
    - name: help
      args: ["--help"]
      expected_output: "Usage:"

    - name: scan-basic
      args: ["scan"]
      expected_status: 0

    - name: scan-dev
      args: ["scan", "--dev"]
      expected_status: 0

    - name: scan-refresh
      args: ["scan", "--refresh"]
      expected_status: 0

    - name: mcp-list
      args: ["mcp", "list"]
      expected_status: 0

    - name: skill-list
      args: ["skill", "list"]
      expected_status: 0

    - name: serve-help
      args: ["serve", "--help"]
      expected_output: "Start the MCP server"

# ============================================================================
# 性能测试配置
# ============================================================================
performance:
  # 扫描性能测试
  scan:
    # 最小扫描时间（毫秒）
    min_time: 100

    # 最大扫描时间（毫秒）
    max_time: 5000

    # 冷启动时间（毫秒）
    cold_start: 1000

    # 热启动时间（毫秒，使用缓存）
    hot_start: 100

  # 缓存性能测试
  cache:
    # 读操作最大时间（微秒）
    read_max_time: 100

    # 写操作最大时间（微秒）
    write_max_time: 100

    # 查找操作最大时间（微秒）
    find_max_time: 100

# ============================================================================
# 集成测试配置
# ============================================================================
integration:
  # MCP 客户端集成测试
  mcp_client:
    enabled: true

    # 测试客户端配置
    client_type: "claude-desktop"

    # 连接超时（毫秒）
    connect_timeout: 5000

    # 工具列表验证
    validate_tools: true

  # 多客户端一致性测试
  multi_client:
    enabled: false

    # 并发连接数
    concurrent_connections: 3

    # 操作列表
    operations:
      - "tools/list"
      - "tools/call"

# ============================================================================
# 错误注入测试配置
# ============================================================================
error_injection:
  # 网络错误模拟
  network:
    enabled: true

    # 延迟注入（毫秒）
    latency: 100

    # 超时模拟（毫秒）
    timeout: 5000

    # 错误率（0-1）
    error_rate: 0.1

  # 文件系统错误模拟
  filesystem:
    enabled: true

    # 模拟只读错误
    readonly: false

    # 模拟磁盘满错误
    disk_full: false

    # 模拟权限错误
    permission_denied: false

# ============================================================================
# 向后兼容性测试配置
# ============================================================================
compatibility:
  # 旧版描述符测试
  legacy_descriptors:
    enabled: true

    # 旧版 schema 版本列表
    schema_versions:
      - "1.0"
      - "1.1"

    # 自动迁移
    auto_migrate: true

  # 旧版 API 测试
  legacy_apis:
    enabled: true

    # 旧版 API 列表
    apis:
      - "createDesktopDiscovery"
      - "createAgentDiscovery"
      - "createManagedDiscovery"

# ============================================================================
# 报告配置
# ============================================================================
reporting:
  # 测试报告输出目录
  output_dir: /tmp/aai-gateway-test/reports

  # 报告格式
  formats:
    - json
    - markdown
    - html

  # 是否包含详细日志
  include_logs: true

  # 是否包含性能数据
  include_performance: true

  # 是否包含截图（如适用）
  include_screenshots: false

# ============================================================================
# 日志配置
# ============================================================================
logging:
  # 日志级别
  level: debug

  # 日志格式
  format: json

  # 日志输出
  outputs:
    - console
    - file

  # 日志文件路径
  file_path: "${test.log_dir}/aai-gateway-test.log"

  # 最大日志文件大小（MB）
  max_size: 10

  # 保留的日志文件数量
  max_files: 5

# ============================================================================
# 其他配置
# ============================================================================
misc:
  # 测试超时（毫秒）
  test_timeout: 10000

  # 重试次数
  max_retries: 3

  # 重试延迟（毫秒）
  retry_delay: 1000

  # 清理测试数据
  cleanup_after_test: true

  # 并行测试
  parallel_tests: true

  # 最大并行测试数
  max_parallel: 4
